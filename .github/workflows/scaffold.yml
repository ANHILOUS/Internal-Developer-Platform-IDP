name: Scaffold Microservice from Port

on:
  workflow_dispatch:
    inputs:
      port_payload:
        required: true
        description: "Port's payload, including action inputs"
        type: string

jobs:
  scaffold-and-create:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Port Payload
        id: port_vars
        run: |
          PAYLOAD='${{ github.event.inputs.port_payload }}'
          
          # Extracts inputs using multiple possible paths for maximum reliability
          echo "REPO_NAME=$(echo $PAYLOAD | jq -r '.payload.properties.repo_name // .body.properties.repo_name')" >> $GITHUB_ENV
          echo "LANG=$(echo $PAYLOAD | jq -r '.payload.properties.language // .body.properties.language')" >> $GITHUB_ENV
          echo "DB_SIZE=$(echo $PAYLOAD | jq -r '.payload.properties.database_size // .body.properties.database_size')" >> $GITHUB_ENV
          echo "PORT_RUN_ID=$(echo $PAYLOAD | jq -r '.context.runId')" >> $GITHUB_ENV

      - name: Create New Repository
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          echo "-------------------------------------------------------"
          echo "IDP ENGINE STARTING: Creating ${{ env.REPO_NAME }}"
          echo "Stack: ${{ env.LANG }} | DB: ${{ env.DB_SIZE }}"
          echo "-------------------------------------------------------"
          
          # Use GitHub CLI to create the actual public repository
          gh repo create ANHILOUS/${{ env.REPO_NAME }} --public --description "Scaffolded via Port IDP" --add-readme
          
          echo "SUCCESS: Repository ANHILOUS/${{ env.REPO_NAME }} is live!"

      - name: Report Success Back to Port
        if: always()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ env.PORT_RUN_ID }}
          logMessage: "Successfully scaffolded ${{ env.REPO_NAME }}! View it here: https://github.com/ANHILOUS/${{ env.REPO_NAME }} 🚀"
